<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prix Gas Station - Complet</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #00ff87; --red: #ff4b2b; --blue: #00d2ff; --glass: rgba(255, 255, 255, 0.1); }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-attachment: fixed;
            color: white;
            padding-bottom: 30px;
        }

        .header { 
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .search-container {
            margin: 15px;
            padding: 15px;
            background: var(--glass);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            text-align: center;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }

        button {
            width: 100%;
            padding: 15px;
            background: var(--green);
            color: #0f2027;
            border: none;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
        }

        .card {
            background: var(--glass);
            margin: 15px;
            padding: 18px;
            border-radius: 25px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .brand { font-size: 1.3rem; font-weight: 900; color: var(--green); text-transform: uppercase; margin-bottom: 2px; }
        .address { font-size: 0.8rem; color: rgba(255,255,255,0.6); display: block; margin-bottom: 15px; }

        .price-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 8px; 
            margin-bottom: 15px; 
        }
        
        .price-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .f-name { font-size: 0.65rem; font-weight: bold; color: var(--blue); display: block; }
        .f-val { font-size: 1.2rem; font-weight: 900; color: #fff; }

        .btn-map {
            display: block;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #loader { display: none; text-align: center; padding: 20px; color: var(--green); }
    </style>
</head>
<body>

<div class="header">
    <h1>PRIX CARBURANTS</h1>
</div>

<div class="search-container">
    <input type="number" id="cpInput" placeholder="Entrer votre code postal ici" value="">
    <button onclick="rechercher()">OK</button>
</div>

<div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
<div id="results"></div>

<script>
    const MARQUES = ["INTERMARCHE", "LECLERC", "TOTAL", "CARREFOUR", "SUPER U", "ESSO", "AVIA", "VULCO", "CASINO", "AUCHAN", "BP", "SHELL"];

    async function rechercher() {
        const cp = document.getElementById('cpInput').value;
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');
        
        if (!cp) {
            alert("Merci d'entrer un code postal.");
            return;
        }

        resultsDiv.innerHTML = "";
        loader.style.display = "block";

        const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=cp%3D%22${cp}%22&limit=25`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            loader.style.display = "none";

            if (data.results.length === 0) {
                resultsDiv.innerHTML = "<p style='text-align:center'>Aucune station trouvée pour ce code.</p>";
                return;
            }

            const stations = data.results.sort((a, b) => {
                const pA = parseFloat(a.gazole_prix) || 9.99;
                const pB = parseFloat(b.gazole_prix) || 9.99;
                return pA - pB;
            });

            stations.forEach(s => {
                let nom = "STATION";
                let full = (s.nom + " " + s.marque + " " + s.adresse).toUpperCase();
                for (let m of MARQUES) { if (full.includes(m)) { nom = m; break; } }

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="brand">${nom}</div>
                    <span class="address"><i class="fas fa-map-marker-alt"></i> ${s.adresse}, ${s.ville}</span>
                    
                    <div class="price-grid">
                        <div class="price-item"><span class="f-name">GAZOLE</span><span class="f-val">${s.gazole_prix || '--'}€</span></div>
                        <div class="price-item"><span class="f-name">SP95-E10</span><span class="f-val">${s.e10_prix || '--'}€</span></div>
                        <div class="price-item"><span class="f-name">SP95</span><span class="f-val">${s.sp95_prix || '--'}€</span></div>
                        <div class="price-item"><span class="f-name">SP98</span><span class="f-val">${s.sp98_prix || '--'}€</span></div>
                        <div class="price-item"><span class="f-name">E85</span><span class="f-val">${s.e85_prix || '--'}€</span></div>
                        <div class="price-item"><span class="f-name">GPLc</span><span class="f-val">${s.gplc_prix || '--'}€</span></div>
                    </div>

                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(nom + ' ' + s.adresse + ' ' + s.ville)}" target="_blank" class="btn-map">
                        <i class="fas fa-route"></i> Y ALLER
                    </a>
                `;
                resultsDiv.appendChild(card);
            });
        } catch (e) {
            loader.style.display = "none";
            alert("Erreur de connexion");
        }
    }
</script>
</body>
</html>
