<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRIX CARBURANT PRO</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        :root { --green: #00ff87; --blue: #00d2ff; --red: #ff4757; --glass: rgba(255, 255, 255, 0.08); --bg: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; padding-bottom: 50px; overflow-x: hidden; }
        .container { padding: 15px; max-width: 600px; margin: 0 auto; }

        /* HEADER */
        .header { text-align: center; padding: 20px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .pump-logo { font-size: 3rem; color: var(--green); filter: drop-shadow(0 0 10px rgba(0, 255, 135, 0.5)); }
        .header h1 { margin: 0; letter-spacing: 4px; font-size: 1.6rem; text-transform: uppercase; }

        /* MODAL INSTALLATION */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .modal-content { background: #1e293b; margin: 15% auto; padding: 25px; border-radius: 30px; width: 85%; max-width: 400px; border: 1px solid var(--blue); position: relative; text-align: center; box-shadow: 0 0 30px rgba(0, 210, 255, 0.2); }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; color: var(--red); }
        .inst-step { text-align: left; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; margin-top: 10px; border-left: 4px solid var(--blue); font-size: 0.9rem; }

        /* FORMULAIRE */
        .glass-panel { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 20px; margin-bottom: 20px; position: relative; }
        .search-container { position: relative; flex: 1; }
        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        input, select { width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; color: white; outline: none; font-size: 16px; box-sizing: border-box; }
        .autocomplete-items { position: absolute; border: 1px solid rgba(255,255,255,0.1); background: #1e293b; z-index: 1000; top: 100%; left: 0; right: 0; border-radius: 15px; max-height: 200px; overflow-y: auto; }
        .autocomplete-item { padding: 12px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-gps { background: rgba(0, 210, 255, 0.15); color: var(--blue); width: 55px; border-radius: 15px; border: 1px solid var(--blue); cursor: pointer; }
        .btn-main { width: 100%; padding: 18px; background: linear-gradient(90deg, var(--green), var(--blue)); color: #000; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* RESULTATS */
        #map { height: 280px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); margin: 20px 0; display: none; }
        .card { background: var(--glass); padding: 20px; border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 15px; position: relative; }
        .card.cheapest { border: 1px solid var(--green); background: rgba(0, 255, 135, 0.03); }
        .card-num { position: absolute; top: 15px; right: 20px; background: var(--blue); color: #000; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.8rem; }
        .brand { font-size: 1.2rem; font-weight: 900; color: var(--green); text-transform: uppercase; }
        .price-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .price-item { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 12px; display: flex; justify-content: space-between; }
        .price-item.active { border: 1px solid var(--blue); background: rgba(0, 210, 255, 0.1); }
        .btn-nav { width: 100%; padding: 14px; background: rgba(0, 210, 255, 0.05); color: var(--blue); border: 1px solid var(--blue); border-radius: 15px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 800; margin-top: 15px; box-sizing: border-box; }
        #loader { display: none; text-align: center; padding: 20px; }
        #customRangeBox { display: none; margin-bottom: 12px; }
    </style>
</head>
<body>

<div id="installModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeInstall()">×</span>
        <i class="fas fa-download" style="font-size: 3rem; color: var(--green); margin-bottom: 15px;"></i>
        <h2 style="margin: 0;">Installer l'App</h2>
        <p id="installMsg" style="font-size: 0.9rem; color: rgba(255,255,255,0.7);">Accédez aux prix en un clic.</p>
        
        <button id="btnInstallDirect" class="btn-main" style="display:none; margin-top: 20px;">
            <i class="fas fa-plus-circle"></i> INSTALLER MAINTENANT
        </button>

        <div id="iosInstruct" style="display: none; text-align: left;">
            <div class="inst-step"><i class="fas fa-share-square"></i> 1. Appuyez sur <strong>Partager</strong></div>
            <div class="inst-step"><i class="far fa-plus-square"></i> 2. Choisissez <strong>"Sur l'écran d'accueil"</strong></div>
        </div>
        
        <button class="btn-main" style="margin-top: 15px; background: none; border: 1px solid var(--blue); color: var(--blue);" onclick="closeInstall()">PLUS TARD</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <i class="fas fa-gas-pump pump-logo"></i>
        <h1>PRIX CARBURANT</h1>
    </div>

    <div class="glass-panel">
        <div class="search-row">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Ville ou Code Postal" autocomplete="off">
                <div id="autocompleteList" class="autocomplete-items"></div>
            </div>
            <button class="btn-gps" onclick="geolocaliser()"><i class="fas fa-location-arrow"></i></button>
        </div>

        <div class="selection-grid">
            <div class="select-wrapper">
                <span class="select-label">Carburant</span>
                <select id="fuelSelect">
                    <option value="gazole_prix">Gazole</option>
                    <option value="e10_prix">SP95-E10</option>
                    <option value="sp95_prix">Sans Plomb 95</option>
                    <option value="sp98_prix">Sans Plomb 98</option>
                    <option value="e85_prix">Ethanol E85</option>
                    <option value="gplc_prix">GPL</option>
                </select>
            </div>
            <div class="select-wrapper">
                <span class="select-label">Rayon</span>
                <select id="rangeSelect" onchange="checkCustom()">
                    <option value="5000">5 km</option>
                    <option value="10000" selected>10 km</option>
                    <option value="20000">20 km</option>
                    <option value="50000">50 km</option>
                    <option value="custom">Perso...</option>
                </select>
            </div>
        </div>
        <div id="customRangeBox"><input type="number" id="customInput" placeholder="Distance en KM"></div>
        <button class="btn-main" onclick="rechercher()">Rechercher</button>
    </div>

    <div id="map"></div>
    <div id="loader"><i class="fas fa-sync fa-spin fa-2x" style="color: var(--green);"></i></div>
    <div id="results"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- LOGIQUE INSTALLATION ---
    let deferredPrompt;
    const installModal = document.getElementById('installModal');
    const btnInstallDirect = document.getElementById('btnInstallDirect');
    const iosInstruct = document.getElementById('iosInstruct');

    // Détection Android (Chrome)
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installModal.style.display = 'block';
        btnInstallDirect.style.display = 'block';
    });

    btnInstallDirect.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            closeInstall();
        }
    });

    // Détection iOS (Safari/Chrome sur iOS)
    window.addEventListener('load', () => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        const isiOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        if (!isStandalone && isiOS) {
            installModal.style.display = 'block';
            iosInstruct.style.display = 'block';
            document.getElementById('installMsg').innerText = "Installation sur iPhone :";
        }
    });

    function closeInstall() { installModal.style.display = 'none'; }

    // --- LOGIQUE CARBURANT ---
    const MARQUES = ["TOTAL", "INTERMARCHE", "LECLERC", "CARREFOUR", "SUPER U", "ESSO", "AVIA", "AUCHAN", "BP", "SHELL", "NETTO", "DYNEFF", "ELAN", "CASINO"];
    const TYPES = [{ key: 'gazole_prix', label: 'GAZOLE' }, { key: 'e10_prix', label: 'E10' }, { key: 'sp95_prix', label: 'SP95' }, { key: 'sp98_prix', label: 'SP98' }, { key: 'e85_prix', label: 'E85' }, { key: 'gplc_prix', label: 'GPL' }];

    let map = L.map('map');
    let markersLayer = L.layerGroup().addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

    function checkCustom() { document.getElementById('customRangeBox').style.display = (document.getElementById('rangeSelect').value === 'custom') ? 'block' : 'none'; }

    // Autocomplétion
    const searchInput = document.getElementById('searchInput');
    const autoList = document.getElementById('autocompleteList');

    searchInput.addEventListener('input', async function() {
        const val = this.value; autoList.innerHTML = "";
        if (val.length < 3) return;
        try {
            const res = await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(val)}&type=municipality&limit=5`);
            const data = await res.json();
            data.features.forEach(f => {
                const div = document.createElement('div');
                div.className = "autocomplete-item";
                div.innerHTML = `<strong>${f.properties.label}</strong> (${f.properties.context.split(',')[0]})`;
                div.onclick = () => { searchInput.value = f.properties.label; autoList.innerHTML = ""; rechercher(f.geometry.coordinates[1], f.geometry.coordinates[0]); };
                autoList.appendChild(div);
            });
        } catch(e) {}
    });

    function geolocaliser() {
        document.getElementById('loader').style.display = "block";
        navigator.geolocation.getCurrentPosition((p) => rechercher(p.coords.latitude, p.coords.longitude), () => { document.getElementById('loader').style.display = "none"; alert("Activez le GPS."); });
    }

    async function rechercher(lat = null, lon = null) {
        const fuel = document.getElementById('fuelSelect').value;
        const resDiv = document.getElementById('results');
        const rSelect = document.getElementById('rangeSelect').value;
        let rayon = (rSelect === 'custom') ? (parseInt(document.getElementById('customInput').value) * 1000) : parseInt(rSelect);

        document.getElementById('loader').style.display = "block";
        resDiv.innerHTML = ""; markersLayer.clearLayers();

        let filter = (lat && lon) ? `within_distance(geom, geom'POINT(${lon} ${lat})', ${rayon}m)` : `ville LIKE "${searchInput.value.toUpperCase()}"`;

        try {
            const url = `https://data.economie.gouv.fr/api/explore/v2.1/catalog/datasets/prix-des-carburants-en-france-flux-instantane-v2/records?where=${encodeURIComponent(filter)}&limit=50`;
            const res = await fetch(url);
            const data = await res.json();
            document.getElementById('loader').style.display = "none";
            
            let filtered = data.results.filter(s => s[fuel] != null).sort((a,b) => parseFloat(a[fuel]) - parseFloat(b[fuel]));
            if (!filtered.length) { resDiv.innerHTML = "<p style='text-align:center;'>Aucune station.</p>"; return; }

            document.getElementById('map').style.display = "block";
            let points = [];
            filtered.forEach((s, i) => {
                let name = "Station";
                let raw = `${s.nom} ${s.marque} ${s.adresse}`.toUpperCase();
                for (let m of MARQUES) { if (raw.includes(m)) { name = m; break; } }
                const isBest = (i === 0);
                let priceHTML = "";
                TYPES.forEach(t => { if (s[t.key]) priceHTML += `<div class="price-item ${t.key === fuel ? 'active' : ''}"><span style="font-size:0.6rem; color:var(--blue);">${t.label}</span><span style="font-weight:900;">${s[t.key]}€</span></div>`; });

                if (s.geom) {
                    const icon = L.divIcon({ className: 'custom-pin', html: `<i class="fas fa-map-marker-alt" style="color:${isBest ? '#00ff87' : '#00d2ff'}; font-size:30px;"></i>`, iconSize:[30,30], iconAnchor:[15,30] });
                    L.marker([s.geom.lat, s.geom.lon], {icon}).addTo(markersLayer).bindPopup(`<b>${name}</b><br>${s[fuel]}€`);
                    points.push([s.geom.lat, s.geom.lon]);
                }

                resDiv.innerHTML += `
                    <div class="card ${isBest ? 'cheapest' : ''}">
                        <div class="card-num">${i+1}</div>
                        <span class="brand">${isBest ? '⭐ ' : ''}${name}</span>
                        <span style="font-size:0.8rem; color:rgba(255,255,255,0.5); display:block;">${s.adresse}, ${s.ville}</span>
                        <div class="price-grid">${priceHTML}</div>
                        <a href="https://www.google.com/maps/dir/?api=1&destination=${s.geom.lat},${s.geom.lon}" target="_blank" class="btn-nav">
                            <i class="fas fa-directions"></i> Y ALLER
                        </a>
                    </div>`;
            });
            map.fitBounds(points, {padding: [30, 30]});
            setTimeout(() => map.invalidateSize(), 300);
        } catch (e) { document.getElementById('loader').style.display = "none"; }
    }
</script>
</body>
</html>
