<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FuelRadar — Recherche par Ville</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <div class="logo">⛽ FUEL<span class="logo-accent">RADAR</span></div>
    <p class="tagline">Trouvez le moins cher à la ronde</p>
</header>

<div class="search-panel">
    <div class="input-block">
        <label>Ville ou Code Postal</label>
        <div class="input-row">
            <input type="text" id="addrInput" placeholder="Ex: Paris, 69001..." />
        </div>
    </div>

    <div class="rayon-block">
        <label>Rayon de recherche : <strong id="rayon-val">15</strong> km</label>
        <input type="range" id="rayon" min="5" max="50" value="15" step="5" oninput="document.getElementById('rayon-val').textContent=this.value">
    </div>

    <div class="fuel-filter">
        <div class="fuel-chips">
            <button class="chip active" data-fuel="gazole">Gazole</button>
            <button class="chip" data-fuel="e10">E10</button>
            <button class="chip" data-fuel="sp95">SP95</button>
            <button class="chip" data-fuel="sp98">SP98</button>
            <button class="chip" data-fuel="e85">E85</button>
        </div>
    </div>

    <button class="btn-main" onclick="lancerRecherche()">🔍 RECHERCHER</button>
</div>

<div id="map-container" class="map-container hidden">
    <div id="map"></div>
</div>

<div id="loader" class="loader hidden">
    <p>SCAN EN COURS...</p>
</div>

<div id="results"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
